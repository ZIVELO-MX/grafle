<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0f172a"/>

  <!-- Left graph — unsolved, muted (slate tones) -->
  <line x1="140" y1="190" x2="300" y2="130" stroke="#1e293b" stroke-width="6" stroke-linecap="round"/>
  <line x1="300" y1="130" x2="380" y2="295" stroke="#1e293b" stroke-width="6" stroke-linecap="round"/>
  <line x1="380" y1="295" x2="275" y2="430" stroke="#1e293b" stroke-width="6" stroke-linecap="round"/>
  <line x1="275" y1="430" x2="115" y2="415" stroke="#1e293b" stroke-width="6" stroke-linecap="round"/>
  <line x1="115" y1="415" x2="45"  y2="270" stroke="#1e293b" stroke-width="6" stroke-linecap="round"/>
  <line x1="45"  y1="270" x2="140" y2="190" stroke="#1e293b" stroke-width="6" stroke-linecap="round"/>
  <line x1="140" y1="190" x2="275" y2="430" stroke="#1e293b" stroke-width="6" stroke-linecap="round"/>
  <line x1="300" y1="130" x2="115" y2="415" stroke="#1e293b" stroke-width="6" stroke-linecap="round"/>
  <circle cx="140" cy="190" r="24" fill="#0f172a" stroke="#334155" stroke-width="4"/>
  <circle cx="300" cy="130" r="24" fill="#0f172a" stroke="#334155" stroke-width="4"/>
  <circle cx="380" cy="295" r="24" fill="#0f172a" stroke="#334155" stroke-width="4"/>
  <circle cx="275" cy="430" r="24" fill="#0f172a" stroke="#334155" stroke-width="4"/>
  <circle cx="115" cy="415" r="24" fill="#0f172a" stroke="#334155" stroke-width="4"/>
  <circle cx="45"  cy="270" r="24" fill="#0f172a" stroke="#334155" stroke-width="4"/>

  <!-- Right graph — solved, blue -->
  <line x1="1060" y1="190" x2="900"  y2="130" stroke="#1d4ed8" stroke-width="6" stroke-linecap="round"/>
  <line x1="900"  y1="130" x2="820"  y2="295" stroke="#1d4ed8" stroke-width="6" stroke-linecap="round"/>
  <line x1="820"  y1="295" x2="925"  y2="430" stroke="#1d4ed8" stroke-width="6" stroke-linecap="round"/>
  <line x1="925"  y1="430" x2="1085" y2="415" stroke="#1d4ed8" stroke-width="6" stroke-linecap="round"/>
  <line x1="1085" y1="415" x2="1155" y2="270" stroke="#1d4ed8" stroke-width="6" stroke-linecap="round"/>
  <line x1="1155" y1="270" x2="1060" y2="190" stroke="#1d4ed8" stroke-width="6" stroke-linecap="round"/>
  <line x1="1060" y1="190" x2="925"  y2="430" stroke="#1d4ed8" stroke-width="6" stroke-linecap="round"/>
  <line x1="900"  y1="130" x2="1085" y2="415" stroke="#1d4ed8" stroke-width="6" stroke-linecap="round"/>
  <circle cx="1060" cy="190" r="24" fill="#1e3a8a" stroke="#3b82f6" stroke-width="4"/>
  <circle cx="900"  cy="130" r="24" fill="#1e3a8a" stroke="#3b82f6" stroke-width="4"/>
  <circle cx="820"  cy="295" r="24" fill="#1e3a8a" stroke="#3b82f6" stroke-width="4"/>
  <circle cx="925"  cy="430" r="24" fill="#1e3a8a" stroke="#3b82f6" stroke-width="4"/>
  <circle cx="1085" cy="415" r="24" fill="#1e3a8a" stroke="#3b82f6" stroke-width="4"/>
  <circle cx="1155" cy="270" r="24" fill="#1e3a8a" stroke="#3b82f6" stroke-width="4"/>

  <!-- Title -->
  <text x="600" y="295"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="128" font-weight="800" fill="white"
        text-anchor="middle" dominant-baseline="auto" letter-spacing="-3">Grafle</text>

  <!-- Tagline -->
  <text x="600" y="378"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="28" fill="#94a3b8"
        text-anchor="middle" dominant-baseline="auto" letter-spacing="0.3">Connect every edge. Or prove it can't be done.</text>

  <!-- "Daily puzzle" badge -->
  <rect x="478" y="418" width="244" height="46" rx="23" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <text x="600" y="441"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="15" fill="#64748b" font-weight="600"
        text-anchor="middle" dominant-baseline="middle" letter-spacing="4">DAILY PUZZLE</text>
</svg>
